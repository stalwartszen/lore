version: '3.9'

services:
  mysql:
    image: mysql:8.2
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: lore_root
      MYSQL_DATABASE: lore
      MYSQL_USER: lore
      MYSQL_PASSWORD: lore_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  lore:
    build: .
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql://lore:lore_password@mysql:3306/lore"
      PORT: "3000"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GROQ_API_KEY: "${GROQ_API_KEY:-}"
    ports:
      - "3000:3000"
    volumes:
      - ./repos:/repos   # mount repos to index

volumes:
  mysql_data:
